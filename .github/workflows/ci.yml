name: CI Pipeline

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Create uv virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -r pyproject.toml

      # 🟡 Formato (solo informa)
      - name: Ruff format check (non-blocking)
        run: ruff format --check . || true

      # 🟡 Lint (solo informa)
      - name: Run Ruff (lint non-blocking)
        run: ruff check . || true

      # 🟡 Docstrings (solo informa)
      - name: Check docstrings (non-blocking)
        run: ruff check . --select D || true