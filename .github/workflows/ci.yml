name: CI Pipeline

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  ci:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Código ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Entorno ───────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras

      # ── 3. Formato ───────────────────────────────────────────────────────────
      - name: Ruff format check
        continue-on-error: true
        run: uv run ruff format --check .

      # ── 4. Lint ──────────────────────────────────────────────────────────────
      - name: Ruff lint
        continue-on-error: true
        run: uv run ruff check .

      # ── 5. Tests ─────────────────────────────────────────────────────────────
      - name: Run tests
        run: uv run pytest -v

      # ── 6. Score de calidad (informativo) ────────────────────────────────────
      - name: Ruff score
        if: always()
        run: |
          ERRORS=$(uv run ruff check etl/ --output-format=concise 2>/dev/null | grep -c "^etl/" || true)
          TOTAL=$(find etl/ -name "*.py" | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
          echo "──────────────────────────────────"
          echo "  Ruff issues : $ERRORS"
          echo "  Lines of code (etl/): $TOTAL"
          echo "──────────────────────────────────"

      # ── 7. Docstrings (informativo) ──────────────────────────────────────────
      - name: Docstring coverage (non-blocking)
        if: always()
        run: uv run ruff check . --select D || true

      # ── 8. Resumen del job ───────────────────────────────────────────────────
      # Imprime un resumen claro al final, visible en el log de GitHub Actions.
      - name: CI summary
        if: always()
        run: |
          echo "══════════════════════════════════════"
          echo "  CI Pipeline — data-product-forecasting"
          echo "══════════════════════════════════════"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Commit : ${{ github.sha }}"
          echo "  Runner : ${{ runner.os }} / Python 3.11"
          echo "══════════════════════════════════════"
