name: CI Pipeline

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -r pyproject.toml

      - name: Ruff format check
        run: ruff format --check .

      - name: Run Ruff (lint with report)
        run: |
          ruff check . --output-format=full | tee ruff-report.txt
          ERRORS=$(grep -c ":" ruff-report.txt || true)
          echo "Total issues found: $ERRORS"
          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi

      - name: Enforce docstrings
        run: |
          ruff check . --select D > docstring-report.txt || true
          MISSING=$(cat docstring-report.txt | wc -l)
          echo "Missing docstring issues: $MISSING"
          if [ "$MISSING" -gt 0 ]; then
            cat docstring-report.txt
            exit 1
          fi

      - name: Run tests
        run: pytest