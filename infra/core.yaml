
AWSTemplateFormatVersion: '2010-09-09'
Description: >
  data-product-forecasting - Infraestructura completa.
  Despliega RDS PostgreSQL 17, Secrets Manager, ECS Fargate con ALB,
  IAM, CloudWatch y opcionalmente una read replica de RDS.

# ─────────────────────────────────────────────────────────────────────────────
# PARAMETERS
# ─────────────────────────────────────────────────────────────────────────────
Parameters:

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC donde se desplegará la aplicación y RDS.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Al menos dos subnets en diferentes AZs. Usadas para ALB, ECS y RDS.

  ImageUri:
    Type: String
    Description: URI completo de la imagen ECR para el contenedor Streamlit.

  ServiceName:
    Type: String
    Default: forecast-app
    MaxLength: 20
    Description: Prefijo para nombrar todos los recursos.

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Número de tareas Fargate a mantener activas.

  Cpu:
    Type: String
    Default: '256'
    AllowedValues: ['256', '512', '1024', '2048', '4096']
    Description: Unidades de CPU para la tarea Fargate.

  Memory:
    Type: String
    Default: '512'
    AllowedValues: ['512', '1024', '2048', '4096', '8192']
    Description: Memoria en MiB para la tarea Fargate.

  LogRetentionDays:
    Type: Number
    Default: 7
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90]
    Description: Retención de logs en CloudWatch (días).

  DBName:
    Type: String
    Default: forecasting
    Description: Nombre de la base de datos inicial en RDS.

  DBUsername:
    Type: String
    Default: postgres
    NoEcho: false
    Description: Usuario maestro de PostgreSQL.

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Contraseña maestra de PostgreSQL (mínimo 8 caracteres).

  S3BucketName:
    Type: String
    Default: ''
    Description: Nombre del bucket S3 para forecasting. Si vacio, permite acceso a cualquier bucket.

  CreateReadReplica:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Crear una read replica para separar lecturas ETL de escrituras CRUD.

# ─────────────────────────────────────────────────────────────────────────────
# CONDITIONS
# ─────────────────────────────────────────────────────────────────────────────
Conditions:
  EnableReadReplica: !Equals [!Ref CreateReadReplica, 'true']
  HasS3Bucket: !Not [!Equals [!Ref S3BucketName, '']]

# ─────────────────────────────────────────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ═══════════════════════════════════════════════════════════════════════════
  # RDS PostgreSQL
  # ═══════════════════════════════════════════════════════════════════════════

  RdsCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub '${ServiceName}/rds/credentials'
      Description: Credenciales maestras de RDS PostgreSQL.
      SecretString: !Sub |
        {
          "username": "${DBUsername}",
          "password": "${DBPassword}",
          "dbname":   "${DBName}",
          "host":     "${RdsInstance.Endpoint.Address}",
          "port":     "5432",
          "engine":   "postgres"
        }

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'PostgreSQL access for ${ServiceName}'
      VpcId: !Ref VpcId
      Tags:
        - Key: app
          Value: !Ref ServiceName

  RdsIngressFromECS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RdsSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref ECSSecurityGroup
      Description: PostgreSQL from ECS tasks only

  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub 'Subnet group for ${ServiceName} RDS'
      SubnetIds: !Ref SubnetIds

  RdsInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub '${ServiceName}-db'
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '17.4'
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: '20'
      StorageType: gp2
      MultiAZ: false
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      BackupRetentionPeriod: 7
      StorageEncrypted: true
      AutoMinorVersionUpgrade: true
      DeletionProtection: false

  RdsReadReplica:
    Type: AWS::RDS::DBInstance
    Condition: EnableReadReplica
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub '${ServiceName}-db-replica'
      DBInstanceClass: db.t3.micro
      SourceDBInstanceIdentifier: !Ref RdsInstance
      PubliclyAccessible: true
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      AutoMinorVersionUpgrade: true

  # ═══════════════════════════════════════════════════════════════════════════
  # IAM Roles
  # ═══════════════════════════════════════════════════════════════════════════

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ServiceName}-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - kms:Decrypt
                Resource: !Ref RdsCredentialsSecret

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ServiceName}-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !If
                    - HasS3Bucket
                    - !Sub 'arn:aws:s3:::${S3BucketName}'
                    - '*'
                  - !If
                    - HasS3Bucket
                    - !Sub 'arn:aws:s3:::${S3BucketName}/*'
                    - '*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref RdsCredentialsSecret
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'

  # ═══════════════════════════════════════════════════════════════════════════
  # ECS Cluster + CloudWatch
  # ═══════════════════════════════════════════════════════════════════════════

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ServiceName}-cluster'
      CapacityProviders:
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ServiceName}'
      RetentionInDays: !Ref LogRetentionDays

  # ═══════════════════════════════════════════════════════════════════════════
  # Networking — Security Groups
  # ═══════════════════════════════════════════════════════════════════════════

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'ALB HTTP - ${ServiceName}'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
          Description: HTTP desde internet

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'ECS tasks - ${ServiceName}'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8501
          ToPort: 8501
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Trafico ALB -> Streamlit

  # ═══════════════════════════════════════════════════════════════════════════
  # ALB + Target Group + Listener
  # ═══════════════════════════════════════════════════════════════════════════

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ServiceName}-alb'
      Scheme: internet-facing
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ServiceName}-tg'
      Protocol: HTTP
      Port: 8501
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /_stcore/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ═══════════════════════════════════════════════════════════════════════════
  # ECS Task Definition + Service
  # ═══════════════════════════════════════════════════════════════════════════

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref ServiceName
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8501
              Protocol: tcp
          Environment:
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: RDS_HOST
              Value: !GetAtt RdsInstance.Endpoint.Address
            - Name: RDS_PORT
              Value: '5432'
            - Name: RDS_DBNAME
              Value: !Ref DBName
            - Name: RDS_USER
              Value: !Ref DBUsername
          Secrets:
            - Name: RDS_PASSWORD
              ValueFrom: !Sub '${RdsCredentialsSecret}:password::'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8501/_stcore/health || exit 1
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 60

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: !Ref ServiceName
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 8501
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 120

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────────────────────────────────────
Outputs:

  AppURL:
    Description: URL publica de la aplicacion Streamlit.
    Value: !Sub 'http://${ALB.DNSName}'

  RdsEndpoint:
    Description: Hostname de RDS para la connection string.
    Value: !GetAtt RdsInstance.Endpoint.Address

  RdsPort:
    Description: Puerto de PostgreSQL.
    Value: !GetAtt RdsInstance.Endpoint.Port

  ConnectionString:
    Description: >
      Template de connection string (reemplazar <password> con el valor de
      Secrets Manager — nunca hardcodear credenciales).
    Value: !Sub 'postgresql+psycopg://${DBUsername}:<password>@${RdsInstance.Endpoint.Address}:5432/${DBName}'

  RdsSecretArn:
    Description: ARN del secreto con credenciales RDS.
    Value: !Ref RdsCredentialsSecret

  RdsReplicaEndpoint:
    Condition: EnableReadReplica
    Description: Hostname de la read replica para lecturas ETL.
    Value: !GetAtt RdsReadReplica.Endpoint.Address

  ECRRepoUri:
    Description: URI del repositorio ECR.
    Value: !Ref ImageUri

  ECSClusterName:
    Description: Nombre del cluster ECS.
    Value: !Ref ECSCluster

  LogGroupName:
    Description: Log group de CloudWatch.
    Value: !Ref LogGroup
